spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/metaphor
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:database/schema.sql
      data-locations: classpath:database/data.sql

# 開發環境下開啟 Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

mybatis:
  mapper-locations: classpath:mapper/*.xml

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# V2 引擎相關配置
v2:
  chronicle:
    path: ./chronicle-data
  snapshot:
    path: ./snapshots
    interval-ms: 300000
